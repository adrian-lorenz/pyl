name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pyl:
    name: pyl secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download pyl
        run: |
          curl -sSL \
            https://github.com/adrian-lorenz/pyl/releases/latest/download/pyl-linux-amd64 \
            -o /usr/local/bin/pyl
          chmod +x /usr/local/bin/pyl

      - name: Run scan
        # --format sarif  → SARIF goes to stdout, redirected into results.sarif
        # --github-summary → Markdown Job Summary goes to $GITHUB_STEP_SUMMARY
        # continue-on-error so findings don't abort the upload steps
        run: pyl check --format sarif --github-summary > results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
