name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Read version from Cargo.toml ─────────────────────────────────────────────
  prepare:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Release tag: v${VERSION}"

  # ── Linux & Windows stable targets ──────────────────────────────────────────
  build-linux-windows:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-amd64
            ext: ""
          - target: aarch64-unknown-linux-musl
            name: linux-arm64
            ext: ""
          - target: x86_64-pc-windows-gnu
            name: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: |
          curl -sSL \
            https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          cp target/${{ matrix.target }}/release/pyl${{ matrix.ext }} \
             pyl-${{ matrix.name }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyl-${{ matrix.name }}
          path: pyl-${{ matrix.name }}${{ matrix.ext }}

  # ── macOS ARM64 ───────────────────────────────────────────────────────────────
  build-macos:
    name: Build macos-arm64
    needs: prepare
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Stage binary
        run: cp target/aarch64-apple-darwin/release/pyl pyl-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyl-macos-arm64
          path: pyl-macos-arm64

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prepare, build-linux-windows, build-macos]

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show binaries
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: pyl ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `pyl-linux-amd64` |
            | Linux ARM64 | `pyl-linux-arm64` |
            | Windows x86_64 | `pyl-windows-amd64.exe` |
            | macOS Apple Silicon | `pyl-macos-arm64` |

            ### Install (Linux / macOS)
            ```bash
            chmod +x pyl-linux-amd64
            sudo mv pyl-linux-amd64 /usr/local/bin/pyl
            ```
          files: dist/*
